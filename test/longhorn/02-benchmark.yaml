# Longhorn fio benchmark — compare against proxmox-csi
#
# Run against Longhorn:
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml apply -f test/longhorn/02-benchmark.yaml
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml -n longhorn-test wait --for=condition=ready pod/fio-longhorn --timeout=120s
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml -n longhorn-test logs -f fio-longhorn
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml delete -f test/longhorn/02-benchmark.yaml
#
# Then swap storageClassName to proxmox-csi (and adjust PVC name) for a
# side-by-side comparison on the same workload profile.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-bench-pvc
  namespace: longhorn-test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: fio-longhorn
  namespace: longhorn-test
spec:
  restartPolicy: Never
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  containers:
    - name: fio
      image: nixery.dev/fio
      command:
        - sh
        - -c
        - |
          set -e
          echo "=== fio benchmark against Longhorn volume ==="
          echo ""

          echo "--- 4K Random Read (IOPS) ---"
          fio --name=randread --ioengine=libaio --direct=1 \
              --bs=4k --iodepth=32 --rw=randread --size=1G \
              --filename=/data/fio.img --runtime=30 --time_based \
              --output-format=terse | awk -F';' '{printf "IOPS: %s  BW: %s KB/s  Lat: %s us\n", $8, $7, $40}'

          echo ""
          echo "--- 4K Random Write (IOPS) ---"
          fio --name=randwrite --ioengine=libaio --direct=1 \
              --bs=4k --iodepth=32 --rw=randwrite --size=1G \
              --filename=/data/fio.img --runtime=30 --time_based \
              --output-format=terse | awk -F';' '{printf "IOPS: %s  BW: %s KB/s  Lat: %s us\n", $49, $48, $81}'

          echo ""
          echo "--- 4K 70/30 Mixed randread/randwrite ---"
          fio --name=mixed --ioengine=libaio --direct=1 \
              --bs=4k --iodepth=32 --rw=randrw --rwmixread=70 --size=1G \
              --filename=/data/fio.img --runtime=30 --time_based \
              --output-format=normal | grep -E 'read:|write:|IOPS'

          echo ""
          echo "--- Sequential Read (throughput) ---"
          fio --name=seqread --ioengine=libaio --direct=1 \
              --bs=1M --iodepth=8 --rw=read --size=1G \
              --filename=/data/fio.img --runtime=20 --time_based \
              --output-format=normal | grep -E 'read:|BW='

          echo ""
          echo "--- Sequential Write (throughput) ---"
          fio --name=seqwrite --ioengine=libaio --direct=1 \
              --bs=1M --iodepth=8 --rw=write --size=1G \
              --filename=/data/fio.img --runtime=20 --time_based \
              --output-format=normal | grep -E 'write:|BW='

          echo ""
          echo "=== Benchmark complete ==="
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: 500m
          memory: 128Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: longhorn-bench-pvc
