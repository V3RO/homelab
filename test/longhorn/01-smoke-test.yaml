# Longhorn smoke-test PVC + Pod
# Usage:
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml apply -f test/longhorn/01-smoke-test.yaml
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml -n longhorn-test logs smoke-test
#   kubectl --kubeconfig tofu/kubernetes/output/kube-config.yaml delete -f test/longhorn/01-smoke-test.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-test
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-smoke-pvc
  namespace: longhorn-test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: smoke-test
  namespace: longhorn-test
spec:
  restartPolicy: Never
  # Tolerate control-plane taint (single-node cluster)
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  containers:
    - name: smoke
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          set -e
          echo "=== Longhorn Smoke Test ==="
          echo "Writing test data..."
          echo "longhorn-ok-$(date -Iseconds)" > /data/smoke.txt
          echo "Verifying read-back..."
          cat /data/smoke.txt
          echo "Checking filesystem..."
          df -h /data
          echo "=== PASSED ==="
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: longhorn-smoke-pvc
