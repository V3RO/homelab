{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-garage
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    {{- range .Values.route.hostnames }}
    - {{ . | quote }}
    {{- end }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.route.gatewayName }}
      namespace: {{ .Values.route.gatewayNamespace }}
      sectionName: {{ .Values.route.gatewaySectionName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.route.serviceName }}
          port: {{ .Values.route.servicePort }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
