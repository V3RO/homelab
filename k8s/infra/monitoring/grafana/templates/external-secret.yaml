apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-authentik-oidc
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: bitwarden-app-secrets
    kind: ClusterSecretStore
  target:
    name: grafana-authentik-oidc
  data:
    - secretKey: GRAFANA_OAUTH_CLIENT_SECRET
      remoteRef:
        key: authentik-grafana-client-secret
---
# CNPG database password (Bitwarden-backed for restore safety)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-grafana-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: bitwarden-cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: cnpg-grafana-credentials
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "grafana"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: cnpg-grafana
