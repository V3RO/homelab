apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-ui
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: internal-gateway
      namespace: istio-ingress-internal
      sectionName: https
  hostnames:
    - longhorn.schober.dev
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
