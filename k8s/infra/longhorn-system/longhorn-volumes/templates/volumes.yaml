{{- /*
  Renders one Longhorn Volume CRD + one Kubernetes PV per entry in .Values.volumes.

  Volume name  = the map key (e.g. "valkey", "forgejo-postgres")
  PV name      = "longhorn-<key>"   (avoids clashing with legacy pv-* names)
  PVC name     = .pvcName           (must match exactly what the app creates)
  Namespace    = .namespace         (where the consuming PVC lives)

  These Volume CRs are deliberately kept in a separate chart from the Longhorn
  operator itself. The pre-sync hook (presync-wait.yaml) ensures that Longhorn's
  engine image is fully deployed before these objects are created, preventing the
  race condition that causes volumes to be stuck in a permanently faulted state.
*/ -}}
{{- range $name, $vol := .Values.volumes }}
---
# Longhorn volume: {{ $name }}
apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  numberOfReplicas: 1
  dataLocality: disabled
  accessMode: rwo
  # Size must be an integer byte string — Longhorn rejects Kubernetes quantity notation.
  size: "{{ include "longhorn-volumes.quantityToBytes" $vol.size }}"
  # migratable is only valid with accessMode: rwx — not supported for rwo block volumes.
  migratable: false
  dataEngine: v1
  # Required: without an explicit frontend the webhook rejects the CREATE.
  frontend: blockdev
  # Required in Longhorn v1.8+: the admission webhook rejects Volume updates unless
  # backupTargetName is explicitly set. "default" is the built-in BackupTarget CR
  # created by Longhorn on install (spec.backupTargetURL: "" = no backup configured).
  backupTargetName: default
{{- end }}
{{- range $name, $vol := .Values.volumes }}
---
# PersistentVolume for Longhorn volume: {{ $name }}
# Bound to PVC {{ $vol.pvcName }} in namespace {{ $vol.namespace }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: longhorn-{{ $name }}
spec:
  capacity:
    storage: {{ $vol.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn-static
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: {{ $name }}
    volumeAttributes:
      numberOfReplicas: "1"
      staleReplicaTimeout: "30"
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    namespace: {{ $vol.namespace }}
    name: {{ $vol.pvcName }}
{{- end }}
