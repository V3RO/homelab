authentik:
  global:
    env:
      - name: AUTHENTIK_POSTGRESQL__HOST
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-app
            key: host
      - name: AUTHENTIK_POSTGRESQL__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-app
            key: dbname
      - name: AUTHENTIK_POSTGRESQL__USER
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-app
            key: username
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-app
            key: password
      - name: AUTHENTIK_POSTGRESQL__PORT
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-app
            key: port
      - name: AUTHENTIK_ARGOCD_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: argocdClientSecret
      - name: AUTHENTIK_GRAFANA_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: grafanaClientSecret
      - name: AUTHENTIK_MEALIE_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: mealieClientSecret
      - name: AUTHENTIK_ZOT_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: zotClientSecret
      - name: AUTHENTIK_FORGEJO_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: forgejoClientSecret
      - name: AUTHENTIK_ACTUAL_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: actualClientSecret
      - name: AUTHENTIK_IMMICH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: immichClientSecret
      - name: AUTHENTIK_KIALI_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: kialiClientSecret
      - name: AUTHENTIK_USER_PASSWORD_V3RO
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: userPassword-V3RO
  authentik:
    existingSecret:
      secretName: authentik-secret

  postgresql:
    enabled: false

  blueprints:
    configMaps:
      - blueprint-demo-app
      - blueprint-argocd
      - blueprint-grafana
      - blueprint-n8n
      - blueprint-mealie
      - blueprint-zot
      - blueprint-forgejo
      - blueprint-adguard
      - blueprint-actual
      - blueprint-immich
      - blueprint-kiali
      - blueprint-users
      - blueprint-enrollment

    users:
      - username: V3RO
        name: Mario Schober
        email: mario@schober.dev
        passwordEnv: AUTHENTIK_USER_PASSWORD_V3RO
        groups:
          - authentik Admins
          - ArgoCD Admins
          - Grafana Admins
          - mealie-admins
          - zot-admins
          - forgejo-admins
          - actual-users
          - adguard-admins
          - immich-admins
          - kiali-admins

    data:
      - name: demo-app
        provider:
          name: Demo App
          externalHost: https://demo.schober.dev
          mode: forward_single
        application:
          name: Demo App
          slug: demo-app
          metaLaunchUrl: https://demo.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nginx.svg
      - name: argocd
        provider:
          kind: oauth2
          name: ArgoCD
          clientId: argocd
          clientSecretEnv: AUTHENTIK_ARGOCD_CLIENT_SECRET
          redirectUris:
            - url: https://argo.schober.dev/api/dex/callback
              matchingMode: strict
            - url: http://localhost:8085/auth/callback
              matchingMode: strict
        application:
          name: ArgoCD
          slug: argocd
          metaLaunchUrl: https://argo.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/argo-cd.svg
        groups:
          - name: ArgoCD Admins
          - name: ArgoCD Viewers
      - name: grafana
        provider:
          kind: oauth2
          name: Grafana
          clientId: grafana
          clientSecretEnv: AUTHENTIK_GRAFANA_CLIENT_SECRET
          includeGroups: true
          redirectUris:
            - url: https://grafana.schober.dev/login/generic_oauth
              matchingMode: strict
        application:
          name: Grafana
          slug: grafana
          metaLaunchUrl: https://grafana.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/grafana.svg
        groups:
          - name: Grafana Admins
          - name: Grafana Editors
          - name: Grafana Viewers
      - name: n8n
        provider:
          name: n8n
          externalHost: https://n8n.schober.dev
          mode: forward_single
        application:
          name: n8n
          slug: n8n
          metaLaunchUrl: https://n8n.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/n8n.svg
      - name: mealie
        provider:
          kind: oauth2
          name: Mealie
          clientId: mealie
          clientSecretEnv: AUTHENTIK_MEALIE_CLIENT_SECRET
          includeGroups: true
          redirectUris:
            - url: https://mealie.schober.dev/login
              matchingMode: strict
            - url: https://mealie.schober.dev/login?direct=1
              matchingMode: strict
        application:
          name: Mealie
          slug: mealie
          metaLaunchUrl: https://mealie.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/mealie.svg
        groups:
          - name: mealie-admins
          - name: mealie-users
      - name: zot
        provider:
          kind: oauth2
          name: Zot
          clientId: zot
          clientSecretEnv: AUTHENTIK_ZOT_CLIENT_SECRET
          includeGroups: true
          redirectUris:
            - url: https://zot.schober.dev/zot/auth/callback/oidc
              matchingMode: strict
        application:
          name: Zot
          slug: zot
          metaLaunchUrl: https://zot.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/zot-registry.svg
        groups:
          - name: zot-admins
          - name: zot-users
      - name: forgejo
        provider:
          kind: oauth2
          name: Forgejo
          clientId: forgejo
          clientSecretEnv: AUTHENTIK_FORGEJO_CLIENT_SECRET
          redirectUris:
            - url: https://git.schober.dev/user/oauth2/authentik/callback
              matchingMode: strict
        application:
          name: Forgejo
          slug: forgejo
          metaLaunchUrl: https://git.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/forgejo.svg
        groups:
          - name: forgejo-admins
          - name: forgejo-users
      - name: adguard
        provider:
          name: AdGuard Home
          externalHost: https://adguard.schober.dev
          mode: forward_single
          unauthenticatedPaths:
            - ^/control/.*
        application:
          name: AdGuard Home
          slug: adguard
          metaLaunchUrl: https://adguard.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/adguard-home.svg
        groups:
          - name: adguard-admins
      - name: actual
        provider:
          kind: oauth2
          name: Actual Budget
          clientId: actual
          clientSecretEnv: AUTHENTIK_ACTUAL_CLIENT_SECRET
          redirectUris:
            - url: https://actual.schober.dev/openid/callback
              matchingMode: strict
        application:
          name: Actual Budget
          slug: actual
          metaLaunchUrl: https://actual.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/actual-budget.svg
        groups:
          - name: actual-users
      - name: immich
        provider:
          kind: oauth2
          name: Immich
          clientId: immich
          clientSecretEnv: AUTHENTIK_IMMICH_CLIENT_SECRET
          redirectUris:
            - url: https://immich.schober.dev/auth/login
              matchingMode: strict
            - url: https://immich.schober.dev/user-settings
              matchingMode: strict
            - url: app.immich:///oauth-callback
              matchingMode: strict
        application:
          name: Immich
          slug: immich
          metaLaunchUrl: https://immich.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/immich.svg
        groups:
          - name: immich-admins
          - name: immich-users
      - name: kiali
        provider:
          kind: oauth2
          name: Kiali
          clientId: kiali
          clientSecretEnv: AUTHENTIK_KIALI_CLIENT_SECRET
          redirectUris:
            - url: https://kiali.schober.dev/
              matchingMode: strict
        application:
          name: Kiali
          slug: kiali
          metaLaunchUrl: https://kiali.schober.dev
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kiali.svg
        groups:
          - name: kiali-admins

postgres:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1
  storage:
    class: longhorn-static
    size: 5Gi
    volumeName: longhorn-authentik-postgres  # pre-created PV → volume authentik-postgres

externalSecret:
  enabled: true
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  data:
    secretKey: authentik-secret-key
    bootstrapPassword: authentik-bootstrap-password
    bootstrapEmail: authentik-bootstrap-email
    bootstrapToken: authentik-bootstrap-token
    argocdClientSecret: authentik-argocd-client-secret
    grafanaClientSecret: authentik-grafana-client-secret
    mealieClientSecret: authentik-mealie-client-secret
    zotClientSecret: zot-oidc-client-secret
    forgejoClientSecret: authentik-forgejo-client-secret
    actualClientSecret: authentik-actual-client-secret
    immichClientSecret: authentik-immich-client-secret
    kialiClientSecret: authentik-kiali-client-secret
    userPasswords:
      - username: V3RO
        bitwardenItem: authentik-user-v3ro-password

route:
  enabled: true
  hostname: auth.schober.dev
  gatewayName: internal-gateway
  gatewayNamespace: istio-ingress-internal
  gatewaySectionName: https
  serviceName: authentik-server
  servicePort: 80
