{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: authentik-secret
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.data.secretKey | quote }}
    {{- if .Values.externalSecret.data.bootstrapPassword }}
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.data.bootstrapPassword | quote }}
    {{- end }}
    {{- if .Values.externalSecret.data.bootstrapEmail }}
    - secretKey: AUTHENTIK_BOOTSTRAP_EMAIL
      remoteRef:
        key: {{ .Values.externalSecret.data.bootstrapEmail | quote }}
    {{- end }}
    {{- if .Values.externalSecret.data.bootstrapToken }}
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.data.bootstrapToken | quote }}
    {{- end }}
    - secretKey: argocdClientSecret
      remoteRef:
        key: argocd-authentik-client-secret
    - secretKey: grafanaClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.grafanaClientSecret | quote }}
    - secretKey: mealieClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.mealieClientSecret | quote }}
    - secretKey: zotClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.zotClientSecret | quote }}
    - secretKey: forgejoClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.forgejoClientSecret | quote }}
    - secretKey: actualClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.actualClientSecret | quote }}
    - secretKey: immichClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.immichClientSecret | quote }}
    - secretKey: kialiClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.data.kialiClientSecret | quote }}
    {{- range .Values.externalSecret.data.userPasswords }}
    - secretKey: userPassword-{{ .username }}
      remoteRef:
        key: {{ .bitwardenItem | quote }}
    {{- end }}
---
# CNPG database password (Bitwarden-backed for restore safety)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-credentials
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "authentik"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.data.cnpgPassword | quote }}
{{- end }}
