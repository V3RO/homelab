apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/V3RO/homelab.git
        revision: main
        directories:
          - path: k8s/infra/*/*
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        # Wave 1: Namespaces and Cilium CNI
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - namespaces
                - cilium
        # Wave 2: Istio mesh
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - base
                - istiod
                - cni
                - ztunnel
        # Wave 3: Certificates + secrets
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - cert-manager
                - bitwarden-issuer
                - cloudflare-issuer
                - external-secrets
        # Wave 4: Platform services
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - gateway
                - cnpg-operator
                - longhorn
                - longhorn-volumes
                - valkey
                - node-feature-discovery
                - external-dns-unifi
                - intel-device-plugins-operator
                - intel-device-plugins-gpu
                - headlamp
                - authentik
        # Wave 5: ArgoCD self-management
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - argo
                - argo-config
                - argo-secrets
        # Wave 6: Observability
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - prometheus
                - loki
                - tempo
                - alloy
                - grafana
        # Wave 7: Apps ApplicationSet
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - argo-apps
  template:
    metadata:
      name: '{{`{{ .path.basename }}`}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: '{{`{{ .path.basename }}`}}'
        app.kubernetes.io/part-of: infra
    spec:
      project: default
      source:
        repoURL: https://github.com/V3RO/homelab.git
        targetRevision: main
        path: '{{`{{ .path.path }}`}}'
        helm:
          releaseName: '{{`{{ .path.basename }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ index .path.segments 2 }}`}}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: istio-validator-istio-system
          jsonPointers:
            - /webhooks/0/failurePolicy
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: istiod-default-validator
          jsonPointers:
            - /webhooks/0/failurePolicy
        - group: apps
          kind: DaemonSet
          name: ztunnel
          jqPathExpressions:
            - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
