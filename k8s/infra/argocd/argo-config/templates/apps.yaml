apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/V3RO/homelab.git
        revision: main
        directories:
          - path: k8s/apps/*/*
  template:
    metadata:
      name: '{{`{{ .path.basename }}`}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: '{{`{{ .path.basename }}`}}'
        app.kubernetes.io/part-of: apps
    spec:
      project: default
      source:
        repoURL: https://github.com/V3RO/homelab.git
        targetRevision: main
        path: '{{`{{ .path.path }}`}}'
        helm:
          releaseName: '{{`{{ .path.basename }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ index .path.segments 2 }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
