apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: {{ .Release.Namespace }}
spec:
  instances: 1

  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: {{ .Values.postgres.storage.size }}
      storageClassName: {{ .Values.postgres.storage.class }}
      {{- with .Values.postgres.storage.volumeName }}
      volumeName: {{ . }}
      {{- end }}

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
