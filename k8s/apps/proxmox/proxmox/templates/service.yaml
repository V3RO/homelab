apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: {{ .Values.proxmox.port }}
      targetPort: {{ .Values.proxmox.port }}
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox
  namespace: {{ .Release.Namespace }}
  labels:
    kubernetes.io/service-name: proxmox
addressType: IPv4
ports:
  - name: https
    port: {{ .Values.proxmox.port }}
    protocol: TCP
endpoints:
  - addresses:
      - {{ .Values.proxmox.ip | quote }}
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: proxmox
  namespace: {{ .Release.Namespace }}
spec:
  host: proxmox.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: SIMPLE
