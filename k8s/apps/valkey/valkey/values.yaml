valkey:
  architecture: standalone

  auth:
    enabled: true
    existingSecret: valkey-auth
    existingSecretPasswordKey: valkey-password

  commonConfiguration: |-
    # Enable AOF persistence for better durability
    appendonly yes
    # Disable snapshots since AOF is enabled
    save ""
    # Cap memory usage to keep the cache lightweight
    maxmemory 256mb
    maxmemory-policy allkeys-lru

  primary:
    kind: Deployment
    persistence:
      enabled: true
      existingClaim: valkey-data
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# PVC pre-created to bind to the static Longhorn PV (longhorn-valkey)
pvc:
  name: valkey-data
  storageClass: longhorn-static
  volumeName: longhorn-valkey
  size: 2Gi



