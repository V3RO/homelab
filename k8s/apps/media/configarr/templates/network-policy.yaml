{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: configarr-allow-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: configarr
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
