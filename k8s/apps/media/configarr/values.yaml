image:
  repository: ghcr.io/raydak-labs/configarr
  tag: "1.28-alpine3.22"
  pullPolicy: IfNotPresent

schedule: "0 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 1
failedJobsHistoryLimit: 1
backoffLimit: 1
ttlSecondsAfterFinished: 3600
restartPolicy: Never

env:
  TZ: Europe/Vienna

config:
  sonarr:
    baseUrl: http://sonarr.media.svc.cluster.local
    downloadClientName: qBittorrent
    category: tv
  radarr:
    baseUrl: http://radarr.media.svc.cluster.local
    downloadClientName: qBittorrent
    category: movies
  qbittorrent:
    host: qbittorrent.media.svc.cluster.local
    port: 80
    useSsl: false
    urlBase: /

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-app-secrets
    kind: ClusterSecretStore
  keys:
    sonarrApiKey: sonarr-api-key
    radarrApiKey: radarr-api-key
    qbittorrentApiKey: qbittorrent-api-key
