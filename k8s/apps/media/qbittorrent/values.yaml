gluetun:
  image:
    repository: qmcgaw/gluetun
    tag: v3.41.1
    pullPolicy: IfNotPresent
  env:
    VPN_SERVICE_PROVIDER: protonvpn
    VPN_TYPE: wireguard
    SERVER_COUNTRIES: Romania
    VPN_PORT_FORWARDING: "on"
    PORT_FORWARD_ONLY: "on"
    HTTPPROXY: "on"
    HTTPPROXY_LISTENING_ADDRESS: ":8888"
    FIREWALL_OUTBOUND_SUBNETS: "10.244.0.0/16,10.96.0.0/12"
    FIREWALL_INPUT_PORTS: "8080,8888"
    DNS_UPSTREAM_RESOLVER_TYPE: dot
    DNS_UPSTREAM_RESOLVERS: "quad9,cloudflare"
    DNS_CACHING: "on"
  healthCheck:
    port: 9999

qbittorrent:
  image:
    repository: lscr.io/linuxserver/qbittorrent
    tag: "5.2.2"
    pullPolicy: IfNotPresent
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Vienna
    WEBUI_PORT: "8080"
  apiKey:
    enabled: true
    secretName: qbittorrent-api-key
    secretKey: API_KEY
  authBypass:
    enabled: true
    trustedReverseProxies: 10.244.0.0/16
    authSubnetWhitelist: 0.0.0.0/0
  service:
    port: 80
    targetPort: 8080

proxy:
  service:
    port: 8888

persistence:
  config:
    enabled: true
    create: true
    claimName: qbittorrent-config
    size: 2Gi
    mountPath: /config
    storageClass: truenas-iscsi-db
  downloads:
    enabled: true
    create: true
    claimName: media-downloads
    accessMode: ReadWriteMany
    size: 100Gi
    mountPath: /downloads
    storageClass: truenas-nfs-media
  library:
    enabled: true
    create: true
    claimName: media-library
    accessMode: ReadWriteMany
    size: 100Gi
    mountPath: /media
    storageClass: truenas-nfs-media

app:
  host: qbit.schober.dev
  gateway:
    name: internal-gateway
    namespace: istio-ingress-internal
    sectionName: https
  backendServiceName: qbittorrent
  servicePort: 80
  authentik:
    enabled: true
    provider: authentik
    outpostService:
      name: ak-outpost-proxy
      namespace: authentik
      port: 9000

externalSecret:
  enabled: true
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden-app-secrets
    kind: ClusterSecretStore
  keys:
    wireguardPrivateKey: protonvpn-wireguard-private-key
    qbittorrentApiKey: qbittorrent-api-key

networkPolicy:
  enabled: true
