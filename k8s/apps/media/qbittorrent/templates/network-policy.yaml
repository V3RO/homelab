{{- if .Values.networkPolicy.enabled }}
# Default deny all egress from media namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow intra-namespace communication
    - to:
        - podSelector: {}
---
# Gluetun/qBittorrent pod is the ONLY pod allowed unrestricted egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qbittorrent-allow-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qbittorrent
  policyTypes:
    - Egress
  egress:
    - {}
---
# Allow ingress from istio-ingress-internal (for HTTPRoutes) and intra-namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qbittorrent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress-internal
      ports:
        - protocol: TCP
          port: {{ .Values.qbittorrent.service.targetPort }}
    - from:
        - podSelector:
            matchLabels:
              app: sonarr
      ports:
        - protocol: TCP
          port: {{ .Values.qbittorrent.service.targetPort }}
    - from:
        - podSelector:
            matchLabels:
              app: radarr
      ports:
        - protocol: TCP
          port: {{ .Values.qbittorrent.service.targetPort }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.service.port }}
{{- end }}
