apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: {{ .Release.Namespace }}
  labels:
    app: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        {{- if .Values.qbittorrent.authBypass.enabled }}
        - name: configure-qbittorrent-auth
          image: "{{ .Values.qbittorrent.image.repository }}:{{ .Values.qbittorrent.image.tag }}"
          imagePullPolicy: {{ .Values.qbittorrent.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              config_dir={{ .Values.persistence.config.mountPath }}/qBittorrent
              config_file=${config_dir}/qBittorrent.conf
              mkdir -p "${config_dir}"
              touch "${config_file}"
              tmp_file=$(mktemp)
              awk -v trusted='{{ .Values.qbittorrent.authBypass.trustedReverseProxies }}' -v whitelist='{{ .Values.qbittorrent.authBypass.authSubnetWhitelist }}' '
                BEGIN {
                  in_preferences = 0
                  wrote_settings = 0
                }
                function write_settings() {
                  if (!wrote_settings) {
                    print "WebUI\\ReverseProxySupportEnabled=true"
                    print "WebUI\\TrustedReverseProxiesList=\"" trusted "\""
                    print "WebUI\\AuthSubnetWhitelistEnabled=true"
                    print "WebUI\\AuthSubnetWhitelist=\"" whitelist "\""
                    wrote_settings = 1
                  }
                }
                {
                  if ($0 == "[Preferences]") {
                    print
                    in_preferences = 1
                    write_settings()
                    next
                  }
                  if (in_preferences && $0 ~ /^\[/) {
                    in_preferences = 0
                  }
                  if (index($0, "WebUI\\ReverseProxySupportEnabled=") == 1 || index($0, "WebUI\\TrustedReverseProxiesList=") == 1 || index($0, "WebUI\\AuthSubnetWhitelistEnabled=") == 1 || index($0, "WebUI\\AuthSubnetWhitelist=") == 1) {
                    next
                  }
                  print
                }
                END {
                  if (!wrote_settings) {
                    print "[Preferences]"
                    write_settings()
                  }
                }
              ' "${config_file}" > "${tmp_file}"
              mv "${tmp_file}" "${config_file}"
          volumeMounts:
            {{- if .Values.persistence.config.enabled }}
            - name: config
              mountPath: {{ .Values.persistence.config.mountPath }}
            {{- end }}
        {{- end }}
        - name: gluetun
          image: "{{ .Values.gluetun.image.repository }}:{{ .Values.gluetun.image.tag }}"
          imagePullPolicy: {{ .Values.gluetun.image.pullPolicy }}
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          envFrom:
            - configMapRef:
                name: qbittorrent-gluetun
          env:
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-secret
                  key: WIREGUARD_PRIVATE_KEY
          ports:
            - name: http-proxy
              containerPort: 8888
              protocol: TCP
            - name: control
              containerPort: {{ .Values.gluetun.healthCheck.port }}
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            periodSeconds: 10
      containers:
        - name: qbittorrent
          image: "{{ .Values.qbittorrent.image.repository }}:{{ .Values.qbittorrent.image.tag }}"
          imagePullPolicy: {{ .Values.qbittorrent.image.pullPolicy }}
          env:
            - name: PUID
              value: {{ .Values.qbittorrent.env.PUID | quote }}
            - name: PGID
              value: {{ .Values.qbittorrent.env.PGID | quote }}
            - name: TZ
              value: {{ .Values.qbittorrent.env.TZ | quote }}
            - name: WEBUI_PORT
              value: {{ .Values.qbittorrent.env.WEBUI_PORT | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.qbittorrent.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.persistence.config.enabled }}
            - name: config
              mountPath: {{ .Values.persistence.config.mountPath }}
            {{- end }}
            {{- if .Values.persistence.downloads.enabled }}
            - name: downloads
              mountPath: {{ .Values.persistence.downloads.mountPath }}
            {{- end }}
            {{- if .Values.persistence.library.enabled }}
            - name: library
              mountPath: {{ .Values.persistence.library.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.config.claimName }}
        {{- end }}
        {{- if .Values.persistence.downloads.enabled }}
        - name: downloads
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.downloads.claimName }}
        {{- end }}
        {{- if .Values.persistence.library.enabled }}
        - name: library
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.library.claimName }}
        {{- end }}
