{{- range $name, $pvc := .Values.persistence }}
{{- if and $pvc.enabled (or (not (hasKey $pvc "create")) $pvc.create) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $pvc.claimName | default $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - {{ $pvc.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ $pvc.size }}
  storageClassName: {{ $pvc.storageClass | default "longhorn-static" }}
  {{- with $pvc.volumeName }}
  volumeName: {{ . }}
  {{- end }}
---
{{- end }}
{{- end }}
