image:
  repository: lscr.io/linuxserver/sonarr
  tag: "4.0.14"
  pullPolicy: IfNotPresent

env:
  PUID: "1000"
  PGID: "1000"
  TZ: Europe/Vienna

proxy:
  HTTP_PROXY: "http://gluetun-proxy.media.svc.cluster.local:8888"
  HTTPS_PROXY: "http://gluetun-proxy.media.svc.cluster.local:8888"
  NO_PROXY: "localhost,127.0.0.1,.svc.cluster.local,.cluster.local"

service:
  port: 80
  targetPort: 8989

persistence:
  config:
    enabled: true
    create: true
    claimName: sonarr-config
    size: 5Gi
    mountPath: /config
  media:
    enabled: true
    create: false
    claimName: media-library
    mountPath: /media
  downloads:
    enabled: true
    create: false
    claimName: media-downloads
    mountPath: /downloads

app:
  host: sonarr.schober.dev
  gateway:
    name: internal-gateway
    namespace: istio-ingress-internal
    sectionName: https
  backendServiceName: sonarr
  servicePort: 80
  authentik:
    enabled: true
    provider: authentik
    outpostService:
      name: ak-outpost-proxy
      namespace: authentik
      port: 9000
