apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: {{ .Release.Namespace }}
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PUID
              value: {{ .Values.env.PUID | quote }}
            - name: PGID
              value: {{ .Values.env.PGID | quote }}
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-secret
                  key: apiKey
            {{- if .Values.proxy }}
            - name: HTTP_PROXY
              value: {{ .Values.proxy.HTTP_PROXY | quote }}
            - name: HTTPS_PROXY
              value: {{ .Values.proxy.HTTPS_PROXY | quote }}
            - name: NO_PROXY
              value: {{ .Values.proxy.NO_PROXY | quote }}
            - name: http_proxy
              value: {{ .Values.proxy.HTTP_PROXY | quote }}
            - name: https_proxy
              value: {{ .Values.proxy.HTTPS_PROXY | quote }}
            - name: no_proxy
              value: {{ .Values.proxy.NO_PROXY | quote }}
            {{- end }}
          {{- if .Values.app.authentik.enabled }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    file=/config/config.xml
                    i=0
                    while [ $i -lt 60 ]; do
                      if [ -f "$file" ]; then
                        if grep -q '<AuthenticationMethod>External</AuthenticationMethod>' "$file"; then
                          exit 0
                        fi
                        if grep -q '<AuthenticationMethod>' "$file"; then
                          sed -i 's|<AuthenticationMethod>[^<]*</AuthenticationMethod>|<AuthenticationMethod>External</AuthenticationMethod>|g' "$file"
                        elif grep -q '</Config>' "$file"; then
                          sed -i '/<\/Config>/i\\  <AuthenticationMethod>External</AuthenticationMethod>' "$file"
                        fi
                        if grep -q '<AuthenticationMethod>External</AuthenticationMethod>' "$file"; then
                          exit 0
                        fi
                      fi
                      i=$((i + 1))
                      sleep 2
                    done
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            {{- if .Values.persistence.config.enabled }}
            - name: config
              mountPath: {{ .Values.persistence.config.mountPath }}
            {{- end }}
            {{- if .Values.persistence.media.enabled }}
            - name: media
              mountPath: {{ .Values.persistence.media.mountPath }}
            {{- end }}
            {{- if .Values.persistence.downloads.enabled }}
            - name: downloads
              mountPath: {{ .Values.persistence.downloads.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.config.claimName }}
        {{- end }}
        {{- if .Values.persistence.media.enabled }}
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.media.claimName }}
        {{- end }}
        {{- if .Values.persistence.downloads.enabled }}
        - name: downloads
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.downloads.claimName }}
        {{- end }}
