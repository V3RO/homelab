{{- if .Values.app.host }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-{{ .Values.app.backendServiceName }}
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.app.host }}
  parentRefs:
    - kind: Gateway
      name: {{ .Values.app.gateway.name }}
      namespace: {{ .Values.app.gateway.namespace }}
      {{- with .Values.app.gateway.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.app.authentik.outpostService.name }}
          namespace: {{ .Values.app.authentik.outpostService.namespace }}
          port: {{ .Values.app.authentik.outpostService.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.app.backendServiceName }}
          port: {{ .Values.app.servicePort }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
