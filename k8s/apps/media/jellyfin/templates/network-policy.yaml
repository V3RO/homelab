# Allow egress to authentik namespace for LDAP (Jellyfin authentication)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jellyfin-allow-egress-authentik
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: jellyfin
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - protocol: TCP
          port: 389
        - protocol: TCP
          port: 636
