{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: gitea-secret
    template:
      data:
        # Gitea OAuth2 provider keys (consumed by gitea.oauth[].existingSecret)
        key: "gitea"
        secret: "{{ `{{ .oauthClientSecret }}` }}"
        # Gitea security secret key
        SECRET_KEY: "{{ `{{ .secretKey }}` }}"
        # Ini-style config for session/cache/queue using Valkey (consumed via additionalConfigSources)
        session: |
          PROVIDER=redis
          PROVIDER_CONFIG=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
        cache: |
          ENABLED=true
          ADAPTER=redis
          HOST=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/1?pool_size=100&idle_timeout=180s&
        queue: |
          TYPE=redis
          CONN_STR=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s&
  data:
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.externalSecret.keys.secretKey | quote }}
    - secretKey: valkeyPassword
      remoteRef:
        key: {{ .Values.externalSecret.keys.valkeyPassword | quote }}
    - secretKey: oauthClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.keys.oauthClientSecret | quote }}
{{- end }}
