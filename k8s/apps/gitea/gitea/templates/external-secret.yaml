{{- if .Values.externalSecret.enabled }}
---
# gitea-secret: flat key/value secrets consumed by env vars and gitea.oauth[].existingSecret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: gitea-secret
    template:
      data:
        # Used by GITEA__SECURITY__SECRET_KEY env var in additionalConfigFromEnvs
        SECRET_KEY: "{{ `{{ .secretKey }}` }}"
        # Used by gitea.oauth[].existingSecret (keys must be named 'key' and 'secret')
        key: "gitea"
        secret: "{{ `{{ .oauthClientSecret }}` }}"
  data:
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.externalSecret.keys.secretKey | quote }}
    - secretKey: oauthClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.keys.oauthClientSecret | quote }}
---
# gitea-ini-config: ini-formatted section files consumed by additionalConfigSources.
# Each key maps to an [ini section] and its value is parsed as KEY=VALUE pairs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-ini-config
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: gitea-ini-config
    template:
      data:
        session: |
          PROVIDER=redis
          PROVIDER_CONFIG=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
        cache: |
          ENABLED=true
          ADAPTER=redis
          HOST=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/1?pool_size=100&idle_timeout=180s&
        queue: |
          TYPE=redis
          CONN_STR=redis://:{{ `{{ .valkeyPassword }}` }}@valkey-master.valkey.svc.cluster.local:6379/2?pool_size=100&idle_timeout=180s&
  data:
    - secretKey: valkeyPassword
      remoteRef:
        key: {{ .Values.externalSecret.keys.valkeyPassword | quote }}
{{- end }}
