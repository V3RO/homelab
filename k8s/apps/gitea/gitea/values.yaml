gitea:
  # Disable all bundled dependencies - using external CNPG + shared Valkey
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: false
  valkey-cluster:
    enabled: false
  valkey:
    enabled: false

  ingress:
    enabled: false

  persistence:
    enabled: true
    create: false  # PVC is managed via templates/pvc.yaml bound to pv-gitea (OpenTofu)
    mount: true
    claimName: gitea-data

  service:
    http:
      type: ClusterIP
      port: 3000
    ssh:
      type: LoadBalancer
      port: 22
      annotations: {}

  gitea:
    config:
      APP_NAME: "Gitea"

      server:
        DOMAIN: git.schober.dev
        ROOT_URL: https://git.schober.dev
        PROTOCOL: http
        HTTP_PORT: 3000
        SSH_DOMAIN: git.schober.dev
        SSH_PORT: 22
        SSH_LISTEN_PORT: 2222
        START_SSH_SERVER: true
        LFS_START_SERVER: true

      database:
        DB_TYPE: postgres
        HOST: gitea-postgres-rw.gitea.svc.cluster.local:5432
        NAME: gitea
        USER: gitea
        SSL_MODE: require

      service:
        DISABLE_REGISTRATION: false
        ALLOW_ONLY_EXTERNAL_REGISTRATION: true
        REQUIRE_SIGNIN_VIEW: true

      oauth2:
        ENABLED: true

      security:
        INSTALL_LOCK: true

    # Sensitive values injected into the config_environment.sh init container.
    # GITEA__<SECTION>__<KEY> format overrides the corresponding [section] KEY in app.ini.
    additionalConfigFromEnvs:
      - name: GITEA__DATABASE__PASSWD
        valueFrom:
          secretKeyRef:
            name: gitea-postgres-app
            key: password
      - name: GITEA__SECURITY__SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: gitea-secret
            key: SECRET_KEY

    # Session, cache and queue config sections are templated by ExternalSecret
    # with the Valkey password already embedded in the connection strings.
    # These are mounted as additional ini-style config sources and merged into app.ini.
    additionalConfigSources:
      - secret:
          secretName: gitea-secret

    oauth:
      - name: "authentik"
        provider: "openidConnect"
        existingSecret: gitea-secret
        autoDiscoverUrl: "https://auth.schober.dev/application/o/gitea/.well-known/openid-configuration"
        iconUrl: "https://auth.schober.dev/static/dist/assets/icons/icon.png"
        scopes: "openid email profile"

# --- Custom template values ---

postgres:
  enabled: true
  clusterName: gitea-postgres
  instances: 1
  storage:
    class: proxmox-csi
    size: 5Gi
  database: gitea
  owner: gitea

pvc:
  enabled: true
  claimName: gitea-data
  storageClass: proxmox-csi
  volumeName: pv-gitea
  size: 10G

app:
  host: git.schober.dev
  gateway:
    name: internal-gateway
    namespace: istio-ingress-internal
    sectionName: https
  backendServiceName: gitea-http
  servicePort: 3000

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  keys:
    secretKey: gitea-secret-key
    valkeyPassword: gitea-valkey-password
    oauthClientSecret: authentik-gitea-client-secret
