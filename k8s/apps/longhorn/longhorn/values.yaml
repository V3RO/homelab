longhorn:
  # ---------------------------------------------------------------------------
  # Default settings applied to all Longhorn volumes unless overridden per-PVC.
  # ---------------------------------------------------------------------------
  defaultSettings:
    # Single replica — no redundancy on a single node. Increase to 2+ when
    # adding worker nodes to get actual fault tolerance.
    defaultReplicaCount: 1

    # Data path on the host. Talos formats /dev/sdb and mounts it here
    # (configured via machine.disks in the Talos machine config patch).
    defaultDataPath: /var/lib/longhorn

    # Reserve 10% of the disk for metadata, WAL overhead, and OS headroom.
    storageMinimalAvailablePercentage: 10

    # 100% = provision up to the raw disk size (no thin-provisioning beyond
    # physical capacity). Raise if you want thin-over-provisioning later.
    storageOverProvisioningPercentage: 100

    # Clean up detached volumes whose pod was deleted unexpectedly so the
    # volume does not stay in a stuck "attaching" state.
    autoDeletePodWhenVolumeDetachedUnexpectedly: true

    # Always allow node drain (required for Talos upgrades / reboots).
    # Longhorn will gracefully detach volumes before the node drains.
    nodeDrainPolicy: always-allow

    # Automatically delete orphaned replicas left behind after a crash.
    orphanAutoDeletion: true

    # Allow replica placement on the same node as the primary (necessary on
    # a single-node cluster where all replicas would otherwise conflict).
    replicaSoftAntiAffinity: true

    # Upgrade Longhorn engines one at a time to avoid simultaneous IO
    # disruption across all volumes.
    concurrentAutomaticEngineUpgradePerNodeLimit: 1

    # Log level — use Info for production, Debug only when troubleshooting.
    logLevel: Info

  # ---------------------------------------------------------------------------
  # StorageClass settings
  # ---------------------------------------------------------------------------
  persistence:
    # Longhorn is the sole StorageClass — proxmox-csi has been removed.
    # longhorn-static is used for pre-provisioned named volumes (see volumes.yaml).
    defaultClass: true
    defaultClassReplicaCount: 1
    defaultFsType: ext4
    reclaimPolicy: Retain
    # Migratable volumes can be live-migrated to another node without detaching
    # first — required for proper pod rescheduling in a multi-node setup later.
    migratable: true

  # ---------------------------------------------------------------------------
  # Component placement — tolerate the control-plane taint.
  # All Longhorn DaemonSets and Deployments must be schedulable on ctrl-01
  # because it is the only node in the cluster.
  # ---------------------------------------------------------------------------
  longhornManager:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    priorityClass: system-node-critical
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi

  longhornDriver:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    priorityClass: system-cluster-critical
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi

  longhornUI:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  # ---------------------------------------------------------------------------
  # Prometheus integration — emit ServiceMonitor so the existing Prometheus
  # stack in the monitoring namespace picks up Longhorn metrics automatically.
  # ---------------------------------------------------------------------------
  metrics:
    serviceMonitor:
      enabled: false

  # ---------------------------------------------------------------------------
  # Disable the built-in ingress — HTTPRoute (Gateway API) is managed by
  # templates/route.yaml using the existing Istio internal gateway.
  # ---------------------------------------------------------------------------
  ingress:
    enabled: false

  # Run the pre-upgrade checker job to catch incompatibilities before upgrades.
  preUpgradeChecker:
    jobEnabled: false
    upgradeVersionCheck: true

# ---------------------------------------------------------------------------
# Static named Longhorn volumes.
# Each entry renders a longhorn.io/v1beta2 Volume CRD + a Kubernetes PV.
# Apps bind to these PVs via existingClaim (home-ops-chart apps) or via
# volumeName in their PVC / CNPG pvcTemplate (StatefulSet / CNPG apps).
#
# Naming convention: volume name == logical app name (no uuid suffixes).
# The PV is named "longhorn-<name>" to avoid clashing with legacy pv-* names.
# ---------------------------------------------------------------------------
volumes:
  # Each entry renders a longhorn.io/v1beta2 Volume CRD + a Kubernetes PV.
  #
  # Fields:
  #   namespace  – where the consuming PVC lives
  #   pvcName    – must match exactly what the app creates (VCT, CNPG, or existingClaim)
  #   size       – Kubernetes quantity string (Mi / Gi / Ti).
  #                Used verbatim in the PV capacity field AND converted to bytes
  #                by the longhorn.quantityToBytes helper for the Volume CRD spec.size.

  # --- simple apps (home-ops-chart, existingClaim) -------------------------
  valkey:
    namespace: valkey
    pvcName: valkey-data
    size: 2Gi

  adguard:
    namespace: adguard
    pvcName: adguard-data
    size: 1Gi

  actual:
    namespace: actual
    pvcName: actual-data
    size: 2Gi

  uptime-kuma:
    namespace: uptime-kuma
    pvcName: uptime-kuma-data
    size: 2Gi

  # --- monitoring (StatefulSet VCT binds by volumeName) --------------------
  grafana:
    namespace: monitoring
    pvcName: grafana
    size: 2Gi

  loki:
    namespace: monitoring
    pvcName: storage-loki-0
    size: 10Gi

  tempo:
    namespace: monitoring
    pvcName: storage-tempo-0
    size: 10Gi

  prometheus:
    namespace: monitoring
    pvcName: storage-volume-prometheus-server-0
    size: 10Gi

  # --- zot (StatefulSet VCT) -----------------------------------------------
  zot:
    namespace: zot
    pvcName: zot-pvc-zot-0
    size: 10Gi

  # --- forgejo -------------------------------------------------------------
  forgejo:
    namespace: forgejo
    pvcName: forgejo-data
    size: 10Gi

  forgejo-postgres:
    namespace: forgejo
    pvcName: forgejo-postgres-1
    size: 5Gi

  # --- authentik -----------------------------------------------------------
  authentik-postgres:
    namespace: authentik
    pvcName: authentik-postgres-1
    size: 5Gi

  # --- mealie --------------------------------------------------------------
  mealie:
    namespace: mealie
    pvcName: mealie-data
    size: 5Gi

  mealie-postgres:
    namespace: mealie
    pvcName: mealie-postgres-1
    size: 10Gi

  # --- n8n -----------------------------------------------------------------
  n8n:
    namespace: n8n
    pvcName: n8n
    size: 5Gi

  n8n-postgres:
    namespace: n8n
    pvcName: n8n-postgres-1
    size: 10Gi

  # --- immich --------------------------------------------------------------
  immich-library:
    namespace: immich
    pvcName: immich-library
    size: 250Gi

  immich-ml:
    namespace: immich
    pvcName: immich-ml-cache
    size: 10Gi

  immich-postgres:
    namespace: immich
    pvcName: immich-postgres-1
    size: 20Gi
