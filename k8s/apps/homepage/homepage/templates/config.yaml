apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Personal:
      - Calendar:
          widget:
            type: calendar
            firstDayInWeek: monday
            view: monthly
            maxEvents: 10
            showTime: true
            integrations:
              - type: ical
                url: {{`{{HOMEPAGE_VAR_PROTON}}`}}
                name: Proton Calendar
      - Mealie:
          widget:
            type: mealie
            url: https://mealie.schober.dev
            key: {{`{{HOMEPAGE_VAR_MEALIE}}`}}
            version: 2
    - Dev:
      - Authentik:
          widget:
            type: authentik
            url: https://auth.schober.dev
            key: {{`{{HOMEPAGE_VAR_AUTHENTIK}}`}}
            version: 2

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
