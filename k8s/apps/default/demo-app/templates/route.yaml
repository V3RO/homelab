apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-demo-app
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
  - demo.schober.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-gateway
      namespace: istio-ingress-internal
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: demo-app
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /