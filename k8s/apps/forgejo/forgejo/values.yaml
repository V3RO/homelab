forgejo:
  # Rootless image is the default - runs as non-root user (uid 1000)
  image:
    rootless: true

  # Disable all bundled DB/cache sub-charts - using external CNPG + shared Valkey
  redis-cluster:
    enabled: false
  redis:
    enabled: false
  postgresql-ha:
    enabled: false
  postgresql:
    enabled: false

  # Disable built-in ingress; HTTPRoute is managed by templates/route.yaml
  ingress:
    enabled: false

  # SSH exposed via LoadBalancer (same as prior Gitea setup)
  service:
    http:
      type: ClusterIP
      port: 3000
    ssh:
      type: LoadBalancer
      port: 22

  # Data persistence - PVC is pre-created by templates/pvc.yaml bound to pv-forgejo (OpenTofu)
  persistence:
    enabled: true
    create: false
    mount: true
    claimName: forgejo-data

  gitea:
    config:
      APP_NAME: "Forgejo"

      server:
        DOMAIN: git.schober.dev
        ROOT_URL: https://git.schober.dev
        PROTOCOL: http
        HTTP_PORT: 3000
        SSH_DOMAIN: git.schober.dev
        SSH_PORT: 22
        SSH_LISTEN_PORT: 2222  # rootless default; built-in SSH server listens here
        START_SSH_SERVER: true
        LFS_START_SERVER: true

      database:
        DB_TYPE: postgres
        HOST: forgejo-postgres-rw.forgejo.svc.cluster.local:5432
        NAME: forgejo
        USER: forgejo
        SSL_MODE: require

      service:
        DISABLE_REGISTRATION: false
        ALLOW_ONLY_EXTERNAL_REGISTRATION: true
        REQUIRE_SIGNIN_VIEW: true

      oauth2:
        ENABLED: true

      security:
        INSTALL_LOCK: true

    # Sensitive values injected via env vars using FORGEJO__ prefix
    additionalConfigFromEnvs:
      - name: FORGEJO__DATABASE__PASSWD
        valueFrom:
          secretKeyRef:
            name: forgejo-postgres-app  # auto-created by CNPG operator
            key: password
      - name: FORGEJO__SECURITY__SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: forgejo-secret  # created by ExternalSecret
            key: SECRET_KEY

    # ini-formatted session/cache/queue config sourced from a secret (contains Valkey connection strings)
    additionalConfigSources:
      - secret:
          secretName: forgejo-ini-config

    # Authentik OAuth2 via OpenID Connect
    oauth:
      - name: "authentik"
        provider: "openidConnect"
        existingSecret: forgejo-secret  # has keys 'key' (client ID) and 'secret' (client secret)
        autoDiscoverUrl: "https://auth.schober.dev/application/o/forgejo/.well-known/openid-configuration"
        iconUrl: "https://auth.schober.dev/static/dist/assets/icons/icon.png"
        scopes: "openid email profile"

# --- Custom template values ---

postgres:
  enabled: true
  clusterName: forgejo-postgres
  instances: 1
  storage:
    class: longhorn-static
    size: 5Gi
    volumeName: longhorn-forgejo-postgres  # pre-created PV → volume forgejo-postgres
  database: forgejo
  owner: forgejo

pvc:
  enabled: true
  claimName: forgejo-data
  storageClass: longhorn-static
  volumeName: longhorn-forgejo  # pre-created PV → volume forgejo
  size: 10Gi

app:
  host: git.schober.dev
  gateway:
    name: internal-gateway
    namespace: istio-ingress-internal
    sectionName: https
  backendServiceName: forgejo-http
  servicePort: 3000

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  keys:
    secretKey: forgejo-secret-key                     # Bitwarden item name
    valkeyPassword: valkey-password                   # Bitwarden item name
    oauthClientSecret: authentik-forgejo-client-secret  # Bitwarden item name
