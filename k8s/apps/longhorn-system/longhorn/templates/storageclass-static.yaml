# longhorn-static StorageClass
#
# Used exclusively for pre-provisioned (static) Longhorn volumes.
# Apps reference pre-created PVs via volumeName in their PVC or CNPG pvcTemplate.
#
# Key properties:
#   - provisioner: driver.longhorn.io  (Longhorn CSI driver handles bind)
#   - volumeBindingMode: Immediate     (PV/PVC binding happens on claim creation)
#   - reclaimPolicy: Retain            (volume data survives PVC deletion —
#                                       critical for disaster recovery: cluster
#                                       destroy+recreate re-attaches existing data)
#   - No parameters that trigger auto-provisioning; all volumes are pre-created
#     via the Longhorn Volume CRDs in volumes.yaml.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-static
  annotations:
    # Not the default; the standard `longhorn` SC remains default during migration.
    # Set storageclass.kubernetes.io/is-default-class: "true" here (and remove it
    # from the longhorn SC) once proxmox-csi is fully removed.
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
volumeBindingMode: Immediate
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  # Volumes using this SC are manually created; numberOfReplicas is informational
  # and carried through as a volumeAttribute on the PV (see volumes.yaml).
  numberOfReplicas: "{{ .Values.longhorn.defaultSettings.defaultReplicaCount }}"
  staleReplicaTimeout: "30"
  fromBackup: ""
