apiVersion: v1
kind: Service
metadata:
  name: truenas
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.truenas.port }}
      targetPort: {{ .Values.truenas.port }}
      protocol: TCP
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: truenas
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - truenas.{{ .Release.Namespace }}.svc.cluster.local
  location: MESH_EXTERNAL
  ports:
    - name: http
      number: {{ .Values.truenas.port }}
      protocol: HTTP
  resolution: STATIC
  endpoints:
    - address: {{ .Values.truenas.ip }}
