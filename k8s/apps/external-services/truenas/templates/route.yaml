apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-truenas
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - {{ .Values.truenas.host }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: truenas
          port: {{ .Values.truenas.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
