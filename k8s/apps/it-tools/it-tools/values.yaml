home-ops-chart:
  image:
    repository: ghcr.io/corentinth/it-tools
    tag: "2024.10.22-7ca5933"
    pullPolicy: IfNotPresent

  ports:
    - name: http
      containerPort: 80
      protocol: TCP

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  service:
    ports:
      - port: 80
        targetPort: http
        protocol: TCP
        name: http

  httpRoute:
    enabled: true
    hostnames:
      - it-tools.schober.dev
    parentRefs:
      - name: internal-gateway
        namespace: istio-ingress-internal
        sectionName: https
    rules:
      - backendRefs:
          - name: it-tools-home-ops-chart
            port: 80
