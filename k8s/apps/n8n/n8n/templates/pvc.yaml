apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.pvc.storageClass }}
  volumeName: {{ .Values.pvc.volumeName }}
  resources:
    requests:
      storage: {{ .Values.pvc.size }}
