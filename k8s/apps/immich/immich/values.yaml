# --- Upstream Immich chart values (nested under `immich:` dependency key) ---
immich:
  # Shared env vars across all Immich components
  controllers:
    main:
      containers:
        main:
          env:
            DB_HOSTNAME: immich-postgres-rw.immich.svc.cluster.local
            DB_PORT: "5432"
            DB_DATABASE_NAME: immich
            DB_USERNAME: immich
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: password
            REDIS_HOSTNAME: valkey-primary.valkey.svc.cluster.local
            REDIS_PORT: "6379"
            REDIS_DBINDEX: "3"
            REDIS_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: REDIS_PASSWORD

  immich:
    persistence:
      library:
        existingClaim: immich-library
    metrics:
      enabled: false
    existingConfiguration: immich-config
    configurationKind: Secret

  # Disable built-in Valkey (use shared cluster Valkey)
  valkey:
    enabled: false

  # Server component
  server:
    ingress:
      main:
        enabled: false  # using Gateway API HTTPRoute instead

  # Machine Learning component (Intel OpenVINO for iGPU acceleration)
  machine-learning:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.6.3-openvino
            env:
              MACHINE_LEARNING_WORKER_TIMEOUT: "300"
            resources:
              limits:
                gpu.intel.com/i915: "1"
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
    persistence:
      cache:
        enabled: true
        size: 10Gi
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: longhorn-static
        # Binds to pre-created PV longhorn-immich-ml → volume immich-ml
        existingClaim: immich-ml-cache

# --- Custom template values (platform integration) ---

# CNPG PostgreSQL with VectorChord extension
postgres:
  enabled: true
  clusterName: immich-postgres
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
  storage:
    class: longhorn-static
    size: 20Gi
    volumeName: longhorn-immich-postgres  # pre-created PV → volume immich-postgres
  database: immich
  owner: immich
  sharedPreloadLibraries:
    - "vchord.so"
  postInitSQL:
    - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
    - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;

# Gateway API HTTPRoute
app:
  host: immich.schober.dev
  gateway:
    name: internal-gateway
    namespace: istio-ingress-internal
    sectionName: https
  backendServiceName: immich-server
  servicePort: 2283

# PVCs (managed by custom template)
persistence:
  immich-library:
    enabled: true
    accessMode: ReadWriteOnce
    size: 250Gi
    storageClass: longhorn-static
    volumeName: longhorn-immich-library  # pre-created PV → volume immich-library
  immich-ml-cache:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: longhorn-static
    volumeName: longhorn-immich-ml  # pre-created PV → volume immich-ml

# External Secrets (Bitwarden)
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  keys:
    redisPassword: valkey-password
    oidcClientSecret: authentik-immich-client-secret
