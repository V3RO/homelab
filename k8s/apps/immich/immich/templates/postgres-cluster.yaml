{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgres.clusterName }}
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.imageName }}
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: {{ .Values.postgres.storage.size }}
      {{- with .Values.postgres.storage.class }}
      storageClassName: {{ . }}
      {{- end }}
  postgresql:
    shared_preload_libraries:
      {{- toYaml .Values.postgres.sharedPreloadLibraries | nindent 6 }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.owner }}
      postInitApplicationSQL:
        {{- toYaml .Values.postgres.postInitSQL | nindent 8 }}
{{- end }}
