{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: immich-secret
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.keys.redisPassword | quote }}
---
# CNPG database password (Bitwarden-backed for restore safety)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-immich-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: bitwarden-cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: cnpg-immich-credentials
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .Values.postgres.owner }}"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.keys.cnpgPassword | quote }}
{{- end }}
