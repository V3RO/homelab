apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-config
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: immich-config
    template:
      type: Opaque
      engineVersion: v2
      data:
        immich-config.json: |
          {
            "backup": {
              "database": {
                "cronExpression": "0 02 * * *",
                "enabled": true,
                "keepLastAmount": 14
              }
            },
            "ffmpeg": {
              "accel": "disabled",
              "accelDecode": false,
              "acceptedAudioCodecs": ["aac", "mp3", "libopus"],
              "acceptedContainers": ["mov", "ogg", "webm"],
              "acceptedVideoCodecs": ["h264"],
              "bframes": -1,
              "cqMode": "auto",
              "crf": 23,
              "gopSize": 0,
              "maxBitrate": "0",
              "preferredHwDevice": "auto",
              "preset": "ultrafast",
              "refs": 0,
              "targetAudioCodec": "aac",
              "targetResolution": "720",
              "targetVideoCodec": "h264",
              "temporalAQ": false,
              "threads": 0,
              "tonemap": "hable",
              "transcode": "required",
              "twoPass": false
            },
            "image": {
              "colorspace": "p3",
              "extractEmbedded": false,
              "fullsize": {
                "enabled": false,
                "format": "jpeg",
                "quality": 80
              },
              "preview": {
                "format": "jpeg",
                "quality": 80,
                "size": 1440
              },
              "thumbnail": {
                "format": "webp",
                "quality": 80,
                "size": 250
              }
            },
            "job": {
              "backgroundTask": {
                "concurrency": 5
              },
              "faceDetection": {
                "concurrency": 2
              },
              "library": {
                "concurrency": 5
              },
              "metadataExtraction": {
                "concurrency": 5
              },
              "migration": {
                "concurrency": 5
              },
              "notifications": {
                "concurrency": 5
              },
              "search": {
                "concurrency": 5
              },
              "sidecar": {
                "concurrency": 5
              },
              "smartSearch": {
                "concurrency": 2
              },
              "thumbnailGeneration": {
                "concurrency": 3
              },
              "videoConversion": {
                "concurrency": 1
              }
            },
            "library": {
              "scan": {
                "cronExpression": "0 0 * * *",
                "enabled": true
              },
              "watch": {
                "enabled": false
              }
            },
            "logging": {
              "enabled": true,
              "level": "log"
            },
            "machineLearning": {
              "availabilityChecks": {
                "enabled": true,
                "interval": 30000,
                "timeout": 2000
              },
              "clip": {
                "enabled": true,
                "modelName": "ViT-B-32__openai"
              },
              "duplicateDetection": {
                "enabled": true,
                "maxDistance": 0.01
              },
              "enabled": true,
              "facialRecognition": {
                "enabled": true,
                "maxDistance": 0.5,
                "minFaces": 3,
                "minScore": 0.7,
                "modelName": "buffalo_l"
              },
              "urls": ["http://immich-machine-learning:3003"]
            },
            "map": {
              "darkStyle": "https://tiles.immich.cloud/v1/style/dark.json",
              "enabled": true,
              "lightStyle": "https://tiles.immich.cloud/v1/style/light.json"
            },
            "metadata": {
              "faces": {
                "import": false
              }
            },
            "newVersionCheck": {
              "enabled": true
            },
            "nightlyTasks": {
              "clusterNewFaces": true,
              "databaseCleanup": true,
              "generateMemories": true,
              "missingThumbnails": true,
              "startTime": "00:00",
              "syncQuotaUsage": true
            },
            "notifications": {
              "smtp": {
                "enabled": false,
                "from": "",
                "replyTo": "",
                "transport": {
                  "host": "",
                  "ignoreCert": false,
                  "password": "",
                  "port": 587,
                  "username": ""
                }
              }
            },
            "oauth": {
              "autoLaunch": true,
              "autoRegister": true,
              "buttonText": "Login with Authentik",
              "clientId": "immich",
              "clientSecret": "{{ .oidcClientSecret }}",
              "defaultStorageQuota": null,
              "enabled": true,
              "issuerUrl": "https://auth.schober.dev/application/o/immich/.well-known/openid-configuration",
              "mobileOverrideEnabled": false,
              "mobileRedirectUri": "",
              "profileSigningAlgorithm": "none",
              "roleClaim": "immich_role",
              "scope": "openid email profile",
              "signingAlgorithm": "RS256",
              "storageLabelClaim": "preferred_username",
              "storageQuotaClaim": "immich_quota",
              "timeout": 30000,
              "tokenEndpointAuthMethod": "client_secret_basic"
            },
            "passwordLogin": {
              "enabled": true
            },
            "reverseGeocoding": {
              "enabled": true
            },
            "server": {
              "externalDomain": "",
              "loginPageMessage": "",
              "publicUsers": true
            },
            "storageTemplate": {
              "enabled": false,
              "hashVerificationEnabled": true,
              "template": "{{`{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}`}}"
            },
            "templates": {
              "email": {
                "albumInviteTemplate": "",
                "albumUpdateTemplate": "",
                "welcomeTemplate": ""
              }
            },
            "theme": {
              "customCss": ""
            },
            "trash": {
              "days": 30,
              "enabled": true
            },
            "user": {
              "deleteDelay": 7
            }
          }
  data:
    - secretKey: oidcClientSecret
      remoteRef:
        key: {{ .Values.externalSecret.keys.oidcClientSecret | quote }}
