{{- range $name, $pvc := .Values.persistence }}
{{- if $pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - {{ $pvc.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ $pvc.size }}
  {{- with $pvc.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
{{- end }}
