istiod:
  profile: ambient
  meshConfig:
    enableTracing: true
    enablePrometheusMerge: true
    extensionProviders:
      - name: tempo-zipkin
        zipkin:
          service: tempo.monitoring.svc.cluster.local
          port: 9411
      - name: alloy-otlp
        opentelemetry:
          service: alloy.monitoring.svc.cluster.local
          port: 4317
      - name: alloy-otlp-logs
        envoyOtelAls:
          service: alloy.monitoring.svc.cluster.local
          port: 4317
      - name: authentik
        envoyExtAuthzHttp:
          service: authentik-server.authentik.svc.cluster.local
          port: 80
          pathPrefix: /outpost.goauthentik.io/auth/envoy
          headersToDownstreamOnAllow:
            - cookie
          headersToUpstreamOnAllow:
            - set-cookie
            - x-authentik-*
          includeRequestHeadersInCheck:
            - cookie
  telemetry:
    enabled: true
    v2:
      enabled: true
      prometheus:
        enabled: true
  pilot:
    env:
      PILOT_ENABLE_TELEMETRY: "true"
