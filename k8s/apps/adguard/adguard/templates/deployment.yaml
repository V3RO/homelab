{{- $image := default dict .Values.image -}}
{{- $pvc := default dict .Values.pvc -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  namespace: {{ .Release.Namespace }}
  labels:
    app: adguard
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      app: adguard
  # AdGuard Home does not support multiple replicas sharing config on a single RWO PVC
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: adguard
    spec:
      initContainers:
        - name: config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              CONFIG_DIR=/opt/adguardhome/conf
              CONFIG_FILE=${CONFIG_DIR}/AdGuardHome.yaml
              if [ ! -f "${CONFIG_FILE}" ]; then
                echo "No config found, seeding from ConfigMap..."
                mkdir -p "${CONFIG_DIR}"
                cp /seed/AdGuardHome.yaml "${CONFIG_FILE}"
                echo "Config seeded."
              else
                echo "Config already exists, skipping seed."
              fi
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: config-seed
              mountPath: /seed
      containers:
        - name: adguard
          image: {{ printf "%s:%s" (default "adguard/adguardhome" (get $image "repository")) (default "v0.107.65" (get $image "tag")) }}
          imagePullPolicy: {{ default "IfNotPresent" (get $image "pullPolicy") }}
          args:
            - --config
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - --work-dir
            - /opt/adguardhome/work
            - --no-check-update
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: conf
          persistentVolumeClaim:
            claimName: {{ default "adguard-data" (get $pvc "claimName") }}
        - name: work
          emptyDir: {}
        - name: config-seed
          configMap:
            name: adguard-config-seed
