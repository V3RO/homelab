{{- $externalSecret := default dict .Values.externalSecret -}}
{{- if (default false (get $externalSecret "enabled")) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ default "1h" (get $externalSecret "refreshInterval") }}
  secretStoreRef:
    name: {{ default "bitwarden-app-secrets" (get (default dict (get $externalSecret "secretStoreRef")) "name") }}
    kind: {{ default "ClusterSecretStore" (get (default dict (get $externalSecret "secretStoreRef")) "kind") }}
  target:
    name: mealie-secret
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: {{ default "mealie-secret-key" (get (default dict (get $externalSecret "keys")) "secretKey") | quote }}
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: {{ default "authentik-mealie-client-secret" (get (default dict (get $externalSecret "keys")) "oidcClientSecret") | quote }}
---
# CNPG database password (Bitwarden-backed for restore safety)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-mealie-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ default "1h" (get $externalSecret "refreshInterval") }}
  secretStoreRef:
    name: bitwarden-cnpg-secrets
    kind: ClusterSecretStore
  target:
    name: cnpg-mealie-credentials
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ default "mealie" (get (default dict .Values.postgres) "owner") }}"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ default "cnpg-mealie" (get (default dict (get $externalSecret "keys")) "cnpgPassword") | quote }}
{{- end }}
